<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра 21</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #1a1a2e;
      color: #eee;
    }
    input, button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
    }
    button {
      background: #e94560;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #ff6b6b;
    }
  </style>
</head>
<body>
  <h1>🃏 Игра 21</h1>
  
  <div id="login-screen">
    <input type="text" id="player-name" placeholder="Ваше имя">
    <input type="text" id="room-id" placeholder="Код комнаты">
    <button onclick="joinGame()">Войти в игру</button>
  </div>
  
  <div id="game-screen" style="display: none;">
    <h2 id="welcome-message"></h2>
    <div id="game-board"></div>
    <button onclick="hit()">Взять карту</button>
    <button onclick="stand()">Пас</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentRoom = '';

    function joinGame() {
      const name = document.getElementById('player-name').value;
      const roomId = document.getElementById('room-id').value;
      
      if (!name || !roomId) {
        alert('Введите имя и код комнаты!');
        return;
      }
      
      currentRoom = roomId;
      socket.emit('join_room', { name, roomId });
      
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'block';
      document.getElementById('welcome-message').textContent = `Игрок: ${name}`;
    }

    function hit() {
      socket.emit('player_action', { action: 'hit', roomId: currentRoom });
    }

    function stand() {
      socket.emit('player_action', { action: 'stand', roomId: currentRoom });
    }

    socket.on('game_state', (state) => {
      console.log('Получено состояние игры:', state);
      document.getElementById('game-board').innerHTML = 
        `<p>Игроков: ${state.players.length}</p>`;
    });
  </script>
</body>
</html>
